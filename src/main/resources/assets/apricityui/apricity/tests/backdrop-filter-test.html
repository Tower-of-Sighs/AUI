<body>
<style>
    body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        display: grid;
        place-items: center;
        gap: 24px;
        align-items: center;
        justify-content: center;
        background:
                radial-gradient(circle at 20% 20%, rgba(255, 120, 90, 0.65), transparent 45%),
                radial-gradient(circle at 80% 30%, rgba(90, 160, 255, 0.65), transparent 48%),
                radial-gradient(circle at 50% 85%, rgba(120, 255, 180, 0.55), transparent 50%),
                repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0 10px, rgba(0, 0, 0, 0.08) 10px 20px),
                #2b2b2b;
        color: #f3f3f3;
        font-family: "Georgia", "Times New Roman", serif;
    }

    .window {
        width: 420px;
        height: 240px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: rgba(255, 255, 255, 0.12);
        box-shadow:
                0 24px 60px rgba(0, 0, 0, 0.35),
                inset 0 0 0 1px rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(12px) brightness(1.08) saturate(1.25);
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 12px;
    }

    .title {
        font-size: 24px;
        font-weight: 700;
    }

    .subtitle {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.88);
    }

    .footer {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
        max-width: 520px;
        text-align: center;
    }
</style>

<div class="window">
    <div class="title">Frosted Glass Window</div>
    <div class="subtitle">backdrop-filter: blur(12px) brightness(1.08) saturate(1.25)</div>
    <div class="subtitle">背景图案应被明显模糊，同时颜色略微提亮。</div>
</div>
<div class="footer">如果毛玻璃生效，窗口内应能看到模糊的渐变与条纹背景。</div>
</body>
