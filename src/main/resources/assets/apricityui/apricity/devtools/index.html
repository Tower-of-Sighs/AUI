<body>
<div class="devtools-root">
    <div class="devtools">
        <div class="chrome">
            <div class="chrome-row">
                <div class="brand-block">
                    <span class="eyebrow">APRACITY DEBUG CONSOLE</span>
                    <span class="title">DevTools</span>
                </div>
                <div class="signal-stack">
                    <div class="signal-pill signal-live">
                        <span class="signal-dot"></span>
                        <span>LIVE</span>
                    </div>
                    <div class="signal-pill signal-mode">DOM</div>
                    <div class="signal-pill signal-tool resource-btn">RES</div>
                    <div class="signal-pill signal-tool close-btn">X</div>
                </div>
            </div>
            <div class="toolbar">
                <div class="toolbar-label">Document</div>
                <div class="doc-switch"></div>
            </div>
            <div class="rail"></div>
        </div>

        <div class="workspace">
            <div class="panel panel-tree">
                <div class="panel-head">
                    <span class="panel-kicker">Structure</span>
                    <span class="panel-title">Tree Navigator</span>
                </div>
                <div class="panel-frame">
                    <div class="tree"></div>
                </div>
            </div>

            <div class="panel panel-inspector">
                <div class="panel-head">
                    <span class="panel-kicker">Styles</span>
                    <span class="panel-title">Inspector</span>
                </div>
                <div class="panel-frame">
                    <div class="inspector"></div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

<style>
    body, div, span, input {
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
    }

    body {
        width: 427px;
        height: 240px;
        margin: 0;
        padding-top: 6px;
        padding-right: 6px;
        align-items: flex-end;
        pointer-events: auto;
        font-family: default;
        font-size: 12px;
        color: #e8eefc;
        transform: translateZ(100px);
    }

    .devtools-root {
        width: 248px;
        height: 228px;
        align-items: stretch;
        justify-content: flex-start;
    }

    .devtools {
        width: 248px;
        height: 228px;
        padding: 6px;
        background-color: #050d18;
        border: 1px solid #295683;
        box-shadow: 0 0 0 1px #02060d, 0 12px 22px #00000096;
    }

    .chrome {
        width: 234px;
        height: 36px;
        padding: 6px 8px 0 8px;
        background-color: #0b182a;
        border: 1px solid #1d4267;
        box-shadow: inset 0 0 0 1px #112741;
    }

    .chrome-row {
        width: 216px;
        height: 11px;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
    }

    .brand-block {
        width: 88px;
        height: 11px;
    }

    .eyebrow {
        height: 0px;
        color: #7393b5;
        font-size: 4px;
        line-height: 0px;
        letter-spacing: 1px;
        visibility: hidden;
    }

    .title {
        height: 7px;
        width: 88px;
        color: #f1f5ff;
        font-size: 5px;
        line-height: 5px;
        text-stroke: 0.4px #f1f5ff;
        overflow: hidden;
    }

    .signal-stack {
        width: 100px;
        height: 11px;
        flex-direction: row;
        justify-content: flex-end;
        align-items: center;
    }

    .signal-pill {
        height: 11px;
        padding-left: 2px;
        padding-right: 2px;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        border: 1px solid #41688d;
        background-color: #13273d;
        color: #cad8f3;
        font-size: 4px;
        line-height: 4px;
        box-shadow: inset 0 0 0 1px #1a3551;
    }

    .signal-live {
        width: 24px;
        margin-right: 2px;
        border-color: #3b7568;
        background-color: #10322d;
        justify-content: space-around;
    }

    .signal-mode {
        width: 14px;
        margin-right: 2px;
    }

    .signal-tool {
        width: 16px;
        color: #9fd0ff;
    }

    .resource-btn {
        background-color: #10263b;
        border-color: #315a82;
    }

    .close-btn {
        width: 12px;
        color: #ffd2d2;
        background-color: #351820;
        border-color: #7d3b4a;
    }

    .signal-dot {
        width: 3px;
        height: 3px;
        margin-right: 0;
        background-color: #7af6cb;
        border: 1px solid #b4ffe5;
    }

    .toolbar {
        width: 216px;
        height: 14px;
        margin-top: 3px;
        flex-direction: row;
        align-items: center;
        justify-content: flex-start;
    }

    .toolbar-label {
        width: 24px;
        height: 5px;
        margin-right: 3px;
        color: #6c88a8;
        font-size: 4px;
        line-height: 4px;
    }

    .doc-switch {
        width: 189px;
        height: 14px;
        flex-direction: row;
        align-items: center;
        border: 1px solid #35689d;
        background-color: #0c1c2f;
        box-shadow: inset 0 0 0 1px #17324f;
        padding-left: 1px;
        padding-right: 1px;
    }

    .doc-arrow {
        width: 13px;
        height: 12px;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        color: #b8dbff;
        border-right: 1px solid #234e7d;
        background-color: #173552;
        font-size: 5px;
        line-height: 8px;
    }

    .doc-next {
        border-right: none;
        border-left: 1px solid #234e7d;
    }

    .doc-name {
        width: 159px;
        height: 12px;
        flex-direction: row;
        padding-left: 3px;
        padding-right: 2px;
        padding-top: 1px;
        align-items: flex-start;
        justify-content: flex-start;
        color: #f4f8ff;
        line-height: 6px;
        font-size: 5px;
        text-stroke: 0.2px #f4f8ff;
        background-color: #10233a;
        border-left: 1px solid #1a3551;
        border-right: 1px solid #1a3551;
        overflow: hidden;
    }

    .rail {
        width: 216px;
        height: 2px;
        margin-top: 3px;
        background-color: #16304d;
        box-shadow: 0 0 6px #2b74d055;
        visibility: hidden;
    }

    .workspace {
        width: 234px;
        height: 179px;
        margin-top: 4px;
        flex-direction: column;
    }

    .panel {
        width: 234px;
        border: 1px solid #1c3c60;
        background-color: #0a1524;
        box-shadow: inset 0 0 0 1px #11263d, 0 0 0 1px #06111d;
    }

    .panel-tree {
        height: 99px;
        margin-bottom: 4px;
    }

    .panel-inspector {
        height: 76px;
    }

    .panel-head {
        width: 232px;
        height: 16px;
        padding-left: 6px;
        padding-top: 2px;
        background-color: #0e2238;
        border-bottom: 1px solid #1e446c;
        box-shadow: inset 0 -1px 0 #11263f;
    }

    .panel-kicker {
        height: 4px;
        color: #6887a8;
        font-size: 3px;
        line-height: 3px;
        letter-spacing: 1px;
    }

    .panel-title {
        height: 6px;
        color: #eef4ff;
        font-size: 5px;
        line-height: 5px;
    }

    .panel-frame {
        width: 232px;
        height: 82px;
        padding: 3px;
        background-color: #07101d;
    }

    .panel-inspector .panel-frame {
        height: 57px;
    }

    .tree, .inspector {
        width: 226px;
        height: 76px;
        overflow: auto;
        background-color: #06101c;
        padding-right: 1px;
    }

    .panel-inspector .inspector {
        height: 51px;
    }

    .tree-row {
        width: 226px;
        min-height: 8px;
        flex-direction: row;
        align-items: center;
        line-height: 6px;
        font-size: 5px;
        color: #dae6fb;
        border-bottom: 1px solid #0d1d31;
        padding-right: 1px;
    }

    .tree-row.selected {
        background-color: #173556;
        box-shadow: inset 2px 0 0 #79b7ff, inset 0 1px 0 #274a73;
    }

    .toggle {
        width: 6px;
        color: #79b7ff;
        align-items: center;
        justify-content: center;
    }

    .node-label {
        color: #eaf1fe;
        text-stroke: 0.2px #eaf1fe;
    }

    .end-row .node-label {
        color: #7b97b5;
    }

    .tree-edit-row {
        width: 226px;
        min-height: 8px;
        flex-direction: row;
        align-items: center;
        line-height: 6px;
        font-size: 5px;
        border-bottom: 1px solid #0d1d31;
        padding-right: 1px;
    }

    .tree-code {
        color: #8dbfff;
        line-height: 6px;
        text-stroke: 0.2px #8dbfff;
    }

    .tree-edit-input {
        height: 8px;
        padding-left: 2px;
        padding-right: 2px;
        color: #edf4ff;
        background-color: #0c1b2d;
        border: 1px solid #28517d;
        line-height: 6px;
        font-size: 5px;
        box-shadow: inset 0 0 0 1px #10233a;
    }

    .tree-edit-input:focus {
        background-color: #112742;
        border-color: #68a7ff;
    }

    .tree-text-input {
        width: 96px;
    }

    .tree-attr-input {
        width: 28px;
    }

    .tree-inline-text-input {
        width: 38px;
    }

    .section {
        width: 226px;
        margin-bottom: 2px;
        padding-left: 4px;
        padding-right: 3px;
        border-left: 2px solid #3d7ec2;
        background-color: #091321;
        box-shadow: inset 0 0 0 1px #0e1e31;
    }

    .section-title {
        width: 214px;
        height: 7px;
        flex-direction: row;
        align-items: center;
        margin-bottom: 1px;
        color: #9cc6ff;
        border-bottom: 1px solid #173657;
        line-height: 5px;
        font-size: 5px;
    }

    .edit-row {
        width: 214px;
        min-height: 8px;
        flex-direction: row;
        align-items: center;
        margin-bottom: 1px;
    }

    .k {
        width: 28px;
        color: #74b1ff;
        line-height: 6px;
        font-size: 5px;
    }

    .edit-input {
        width: 128px;
        height: 8px;
        padding-left: 2px;
        padding-right: 2px;
        color: #edf4ff;
        background-color: #0d1b2d;
        border: 1px solid #28517d;
        line-height: 6px;
        font-size: 5px;
        box-shadow: inset 0 0 0 1px #10233a;
    }

    .edit-input:focus {
        background-color: #112742;
        border-color: #68a7ff;
    }

    .action {
        width: 16px;
        height: 8px;
        margin-left: 2px;
        border: 1px solid #336596;
        background-color: #10253c;
        color: #9cc6ff;
        line-height: 5px;
        font-size: 5px;
        align-items: center;
        justify-content: center;
        box-shadow: inset 0 0 0 1px #17314d;
    }

    .style-block {
        margin-top: 1px;
        margin-bottom: 1px;
        padding-left: 3px;
        border-left: 1px solid #22466d;
        background-color: #081220;
    }

    .source {
        color: #6f89a8;
        line-height: 5px;
        font-size: 5px;
    }

    .selector {
        color: #9bc8ff;
        line-height: 5px;
        font-size: 5px;
    }

    .prop {
        color: #d6e4f8;
        line-height: 5px;
        font-size: 5px;
    }

    .hint {
        color: #6d88a6;
        line-height: 5px;
        font-size: 5px;
    }
</style>

<script>
    function syncHeader() {
        var title = document.querySelector(".title");
        if (!title) return;
        title.innerText = "DevTools";
    }

    syncHeader();
</script>
